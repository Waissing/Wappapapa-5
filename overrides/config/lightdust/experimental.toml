["Experimental Features"]
	#Makes the wind look realistic and natural.
	#Instead of blowing in a straight (boring) line, the wind will swirl, sweep, and create gusts of dust.
	#[Performance Impact: MODERATE-HIGH] - Uses heavy math to make the wind look good.
	enableAdvancedWindMath = true
	#Allows wind to blow dust down tunnels and bounce off obstacles.
	#[Performance Impact: LOW] - Safe to leave on for most computers.
	enableWindDeflection = true
	#Enables realistic air pressure and drafts inside caves.
	#[Performance Impact: LOW] - Uses spatial caching, but can be disabled for older computers.
	enableCaveDrafts = true
	#Multiplier for the speed of wind drafts inside caves.
	#1.0 is gentle , 5.0 is strong wind. Set to 0 to disable.
	# Default: 0.85
	# Range: 0.0 ~ 20.0
	caveDraftStrength = 0.85
	#How many blocks update per tick.
	#Higher = drafts react faster to broken blocks. Lower = better CPU performance.
	# Default: 600
	# Range: 10 ~ 5000
	gridCellsPerTick = 600
	#How far (in blocks) the grid searches for openings.
	#Higher = more accurate cave wind detection, but heavier on CPU.
	# Default: 6
	# Range: 2 ~ 16
	gridProbeDepth = 6
	#If true, dust particles will visually settle and rest when hitting the ground.
	enableDustSettling = true
	#If true, non-player entities (zombies, minecarts, etc) will kick up and disturb dust.
	enableEntityDisturbance = true
	#How strongly non-player entities push dust when moving through it.
	# Default: 0.05
	# Range: 0.0 ~ 2.0
	entityPushStrength = 0.05
	#How often (in ticks) the mod scans for nearby entities.
	#Higher numbers save CPU but make dust react slower. (4 means it updates 5 times a second)
	# Default: 4
	# Range: 1 ~ 20
	entityScanRate = 4
