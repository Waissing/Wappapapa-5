["Spawning Rules"]
	#Spawning Algorithm Mode.
	#FANCY: Uses a flood fill search to map complex rooms (Heavier on CPU/Memory).
	#FAST: Uses a randomized sampling method to estimate room shape (High FPS, slightly less precise).
	#Allowed Values: FAST, FANCY
	spawningMode = "FAST"
	#FAST Mode Math Limit: How many random points are sampled.
	#Higher = Fills rooms faster. Lower = Better FPS.
	#Recommended: 120 (On values >400 I suggest using fancy))
	# Default: 120
	# Range: 10 ~ 1000
	fastSpawnChecks = 120
	#FANCY Mode Math Limit: Maximum size of the BFS room scan.
	#Note: If this budget is too low, the scan will stop before reaching your full Ambient Radius.
	#Recommended: 1200
	# Default: 1200
	# Range: 100 ~ 4000
	fancySpawnChecks = 1200
	#Spawn Radius: How far away from the player (in blocks) dust will attempt to spawn.
	# Default: 10
	# Range: 1 ~ 32
	ambientRadius = 10
	#Hard Cap Radius: The absolute max distance dust can exist before being deleted.
	# Default: 12
	# Range: 1 ~ 48
	ambientHardCapRadius = 12
	#Max dust particles allowed per single block.
	# Default: 12
	# Range: 1 ~ 32
	ambientBlockCap = 12
	#If true, ambient dust will stop spawning above the maxYLevel. (False recommended to keep outdoor wind dust)
	enableMaxYLevel = false
	#Maximum Y-level (height) where ambient dust is allowed to spawn. Set to ~60 to avoid surface houses.
	# Default: 60
	# Range: -64 ~ 320
	maxYLevel = 60

["Lighting & Performance"]
	#Minimum block light level required for ambient dust to spawn.
	# Default: 6
	# Range: 0 ~ 15
	minBlockLight = 6
	#The minimum difference between Block Light and Sky Light required for dust to spawn during the day.
	# Default: 5
	# Range: 0 ~ 15
	daytimeLightDiff = 5
	#Distance from the player where dust density starts to rapidly decrease (saves performance).
	# Default: 6
	# Range: 1 ~ 32
	falloffDistance = 6
	#Multiplier applied to the max particle cap beyond the falloff distance.
	# Default: 0.3
	# Range: 0.0 ~ 1.0
	falloffMultiplier = 0.3
	#If true, uses raytracing to prevent dust from spawning behind walls you can't see. Highly recommended for performance.
	enableOcclusionCulling = true

[Visuals]
	#If true, the mod will use the HD versions of the dust textures. No performance impact.
	useHdParticles = true
	#Base opacity for ambient dust. (0.22 looks good in vanilla, 0.45+ is better for shader) for HD dust lower these values slightly
	# Default: 0.18
	# Range: 0.0 ~ 1.0
	ambientDustOpacity = 0.18
	#Base size of the dust particles.
	# Default: 0.016
	# Range: 0.001 ~ 0.1
	particleSize = 0.016
	#Base lifetime of the dust particles in ticks. (20 ticks = 1 second)
	# Default: 200
	# Range: 20 ~ 1000
	particleLifetime = 200
	#If true, block-breaking dust and heavy landing dust will inherit the exact color of the block being interacted with.
	#Provides a massive visual upgrade for physics interactions.
	enableDynamicBlockColors = true

["Weather & Wind"]
	#Globally disables all wind and weather based directional pushing.
	enableWind = true
	#Base wind speed modifier during clear weather.
	# Default: 0.25
	# Range: 0.0 ~ 1.0
	windSpeedClear = 0.25
	#Base wind speed modifier during rain.
	# Default: 0.35
	# Range: 0.0 ~ 1.0
	windSpeedRain = 0.35
	#Base wind speed modifier during thunderstorms.
	# Default: 0.5
	# Range: 0.0 ~ 1.0
	windSpeedThunder = 0.5
	#If true, outdoor dust will despawn and stop spawning during rain.
	disableDuringRain = false
	#If true, outdoor dust will despawn and stop spawning during thunderstorms.
	disableDuringThunder = false

["Player & Block Breaking Physics"]
	#Toggles whether player movement, weapon swinging, and shielding disturbs ambient dust.
	enablePlayerInteraction = true
	#Toggles the directional burst of dust particles when a block is destroyed.
	enableBlockBreakingDust = true
	#Toggles the inward suction effect on ambient dust when a block is destroyed.
	enableBreakVacuum = true
	#Radius squared for player physical interaction (slashing swords, moving quickly).
	# Default: 4.0
	# Range: 0.0 ~ 16.0
	playerInteractRadius = 4.0
	#Number of dust particles spawned when a block is broken.
	# Default: 12
	# Range: 0 ~ 50
	breakParticleCount = 12
	#How fast the dust shoots outward from the broken block face.
	# Default: 0.1
	# Range: 0.0 ~ 1.0
	breakParticleSpeed = 0.1
	#How fast block-breaking dust falls downwards over time.
	# Default: 2.0
	# Range: 0.0 ~ 50.0
	actionDustGravity = 2.0
	#How bouncy block breaking dust is when hitting walls/floors. (0.0 = no bounce, 1.0 = super bouncy)
	# Default: 0.2
	# Range: 0.0 ~ 1.0
	actionDustBounce = 0.2
	#When a block turns to air, it creates a momentary vacuum.
	#This defines how far away (in blocks) ambient dust will be sucked toward the broken block.
	# Default: 1.2
	# Range: 0.0 ~ 16.0
	breakVacuumRadius = 1.2
	#How strong the dust is pulled toward the broken block.
	# Default: 10.0
	# Range: 0.0 ~ 1000.0
	breakVacuumForce = 10.0

["Heavy Landing Physics"]
	#Toggles the ring of dust kicked up from heavy landings.
	enableHeavyLandingDust = true
	#The absolute maximum number of dust particles that can spawn from a hard fall.
	# Default: 96
	# Range: 0 ~ 300
	heavyLandingMaxParticles = 96
	#Multiplier for landing dust. (Blocks fallen * Multiplier = Particles spawned).
	# Default: 12
	# Range: 0 ~ 50
	heavyLandingParticleMultiplier = 12
	#Base upward velocity for dust kicked up by a heavy landing.
	# Default: 0.2
	# Range: 0.0 ~ 2.0
	heavyLandingUpwardSpeed = 0.2
	#Base outward ring velocity for dust kicked up by a heavy landing.
	# Default: 0.12
	# Range: 0.0 ~ 2.0
	heavyLandingOutwardSpeed = 0.12
	#How strongly a heavy landing violently pushes preexisting floating ambient dust away.
	# Default: 1.0
	# Range: 0.0 ~ 100.0
	heavyLandingAmbientPush = 1.0
	#The radius (in blocks) that ambient dust is pushed away from the landing site.
	# Default: 4.0
	# Range: 1.0 ~ 16.0
	heavyLandingAmbientRadius = 4.0

["Explosions & Cave Tremors"]
	#Toggles the ceiling dust falling from Warden sonic booms and explosions.
	enableCaveTremors = true
	#Controls the volume of falling dust during explosions or Warden sonic booms.
	#Note: This is a multiplier against the expanding wave circumference, not a hard particle cap.
	# Default: 64
	# Range: 0 ~ 1024
	caveTremorParticleCount = 64
	#Multiplies particle density at the epicenter (within 10% of the max radius).
	# Default: 5.0
	# Range: 1.0 ~ 20.0
	tremorEpicenterMultiplier = 5.0
	#Exponential Falloff. Controls how fast the tremor loses intensity as it travels outward.
	#A value of 6.0 means the center is incredibly violent, but it rapidly drops to a gentle dusting further away.
	# Default: 6.0
	# Range: 1.0 ~ 10.0
	tremorFalloffExponent = 6.0
	#The probability that dust drops from the ceiling instead of kicking up from the floor.
	#0.85 means 85% of particles simulate debris dust falling from above.
	# Default: 0.75
	# Range: 0.0 ~ 1.0
	tremorCeilingBias = 0.75
	#Multiplier for the upward force applied to tremor dust that spawns on the ground.
	# Default: 2.1
	# Range: 0.0 ~ 5.0
	tremorFloorKickForce = 2.1
	#How thick (in blocks) the expanding ring of dust is. Higher = deeper 3D effect.
	# Default: 6.0
	# Range: 1.0 ~ 16.0
	tremorWavefrontThickness = 6.0
	#Gravity applied to dust at the epicenter (makes center dust fall like heavy rocks).
	# Default: 40.0
	# Range: 1.0 ~ 500.0
	tremorMaxGravity = 40.0
	#Gravity applied to dust at the edge of the blast (makes distant dust float like mist).
	# Default: 1.0
	# Range: 0.0 ~ 100.0
	tremorMinGravity = 1.0
	#Multiplier for tremor gravity when dust falls from the ceiling.
	#0.85 = 85% of the base gravity. (lower is lower gravity ex: falls slower
	# Default: 0.4
	# Range: 0.0 ~ 2.0
	tremorRoofMultiplier = 0.4
	#Multiplier for tremor gravity when dust is kicked up from the floor.
	#0.40 = 40% of the base gravity.
	# Default: 0.2
	# Range: 0.0 ~ 2.0
	tremorFloorMultiplier = 0.2

["Thermal updrafts"]
	#Toggles the rising heat physics and updrafts above heat blocks.
	enableThermalUpdrafts = true
	#List of blocks that emit heat, causing dust to swirl upwards.
	#Format: 'modid:block_name=upward_speed,reach_height,radius'
	heatBlocks = ["minecraft:torch=0.015,2,0.4", "minecraft:wall_torch=0.015,2,0.4", "minecraft:soul_torch=0.015,2,0.4", "minecraft:soul_wall_torch=0.015,2,0.4", "minecraft:magma_block=0.02,3,0.7", "minecraft:campfire=0.035,5,0.5", "minecraft:soul_campfire=0.035,5,0.5", "minecraft:lava=0.045,5,0.7", "minecraft:fire=0.035,4,0.6", "minecraft:soul_fire=0.035,4,0.6"]

["Handheld Lights (Dynamic Lights Compat)"]
	#If true, items held in your hand will act as fake light sources, allowing ambient dust to spawn and be colored by the item.
	#Note: You still need to install a dedicated Dynamic Lights mod for actual block illumination. This only affects the dust.
	enableHandheldLights = false
	#List of items/tags and their light properties.
	#Format: 'modid:item_name=radius,#HEXCOLOR' or '#modid:tag=radius,#HEXCOLOR'.
	handheldLightItems = ["minecraft:torch=14,#FFDB8A", "minecraft:lantern=15,#FFDB8A", "minecraft:campfire=15,#FFDB8A", "minecraft:glowstone=15,#FFD273", "minecraft:shroomlight=15,#FF9933", "minecraft:jack_o_lantern=15,#FF9933", "minecraft:soul_torch=10,#4CBAFF", "minecraft:soul_lantern=10,#4CBAFF", "minecraft:soul_campfire=10,#4CBAFF", "minecraft:sea_lantern=15,#8CD9C9", "minecraft:conduit=15,#66E5CC", "minecraft:end_rod=14,#FFE6FF", "minecraft:beacon=15,#99FFFF", "minecraft:crying_obsidian=10,#B300FF", "minecraft:amethyst_cluster=5,#B266FF", "minecraft:redstone_torch=7,#FF0000", "minecraft:redstone_lamp=15,#FF3300", "minecraft:ochre_froglight=15,#FFDCA8", "minecraft:pearlescent_froglight=15,#FFE8E8", "minecraft:verdant_froglight=15,#E8FFD4", "minecraft:glow_berries=14,#FFB233", "minecraft:glow_lichen=7,#99CCB3", "minecraft:magma_block=3,#FF3300", "#minecraft:torches=14,#FFDB8A", "#minecraft:campfires=15,#FF9933"]
